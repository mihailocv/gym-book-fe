server {
    listen       8080;
    server_name  localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/json application/javascript image/svg+xml;
    gzip_min_length 1000;

    # Security headers (za sve što ne pogodi location sa svojim add_header)
    include /etc/nginx/conf.d/security-headers.inc;

    # index.html - NIKAD ne keširati (kljucno da se novi deploy odmah vidi)
    location = /index.html {
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "no-cache" always;
    }

    # Hashirani staticki fajlovi - kesiraj godinu dana
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # Angular routing - sve ostalo na index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}