services:
  gym-book-fe:
    image: ghcr.io/mihailocv/gym-book-fe:latest
    container_name: gym-book-fe
    restart: unless-stopped
    ports:
      - "80:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - gym-book-network

networks:
  gym-book-network:
    driver: bridge
